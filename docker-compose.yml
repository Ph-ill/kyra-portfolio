version: '3.8'

services:
  portfolio:
    build: .
    container_name: built-by-kyra
    ports:
      - "${APP_PORT:-8080}:90"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-}
      CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL:-Portfolio Site <onboarding@resend.dev>}
